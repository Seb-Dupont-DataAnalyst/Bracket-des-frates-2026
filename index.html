<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bracket des frates 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14;
      --bg2: #151820;
      --bg3: #1c2030;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.16);
      --text: #e8eaf0;
      --muted: #6b7280;
      --accent: #f97316;
      --accent2: #fb923c;
      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.12);
      --green-br: rgba(34,197,94,0.3);
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.1);
      --red-br: rgba(239,68,68,0.3);
      --blue: #3b82f6;
      --blue-bg: rgba(59,130,246,0.12);
      --blue-br: rgba(59,130,246,0.3);
      --amber: #f59e0b;
      --amber-bg: rgba(245,158,11,0.12);
      --amber-br: rgba(245,158,11,0.3);
      --r: 8px;
      --fh: 'Barlow Condensed', sans-serif;
      --fb: 'Barlow', sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--fb); font-size:14px; min-height:100vh; }

    /* ── HEADER ── */
    .header { background:var(--bg2); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
    .header-title { font-family:var(--fh); font-size:26px; font-weight:700; letter-spacing:.04em; }
    .header-title span { color:var(--accent); }
    .header-sub { font-size:11px; color:var(--muted); margin-top:2px; }
    .header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .sync-status { font-size:11px; font-weight:500; }
    .sync-status.ok  { color:var(--green); }
    .sync-status.err { color:var(--red); }
    .spin { display:inline-block; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── PHASE BANNER ── */
    .phase-bar { padding:10px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; border-bottom:1px solid var(--border); }
    .phase-badge { display:inline-flex; align-items:center; gap:7px; padding:5px 12px; border-radius:20px; font-family:var(--fh); font-weight:700; font-size:12px; letter-spacing:.06em; }
    .phase-badge.open   { background:var(--green-bg); border:1px solid var(--green-br); color:var(--green); }
    .phase-badge.locked { background:var(--red-bg);   border:1px solid var(--red-br);   color:var(--red); }
    .phase-badge.soon   { background:var(--amber-bg); border:1px solid var(--amber-br); color:var(--amber); }
    .phase-dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
    .phase-dot.pulse { animation:pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .countdown { font-family:var(--fh); font-size:13px; font-weight:600; color:var(--muted); letter-spacing:.04em; }
    .countdown .cd-val { color:var(--amber); }
    .deadline-note { font-size:11px; color:var(--muted); }

    /* ── BANNER ── */
    .banner { margin:10px 24px 0; padding:9px 14px; border-radius:var(--r); font-size:12px; line-height:1.5; }
    .banner.success { background:var(--green-bg); border:1px solid var(--green-br); color:var(--green); }
    .banner.warn    { background:var(--amber-bg); border:1px solid var(--amber-br); color:var(--amber); }
    .banner.danger  { background:var(--red-bg);   border:1px solid var(--red-br);   color:var(--red); }
    .banner.info    { background:var(--blue-bg);  border:1px solid var(--blue-br);  color:var(--blue); }

    /* ── TABS ── */
    .tabs { display:flex; border-bottom:1px solid var(--border); padding:0 24px; margin-top:14px; gap:0; }
    .tab { padding:10px 18px; font-size:13px; font-family:var(--fh); font-weight:700; letter-spacing:.04em; cursor:pointer; border:none; background:transparent; color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .15s; }
    .tab:hover { color:var(--text); }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); }

    /* ── PANELS ── */
    .panel { display:none; padding:20px 24px; }
    .panel.active { display:block; }

    /* ── BRACKET ── */
    .bracket-wrap { overflow-x:auto; padding-bottom:12px; }
    .bracket { display:flex; min-width:1020px; }
    .conf-section { flex:1; display:flex; }
    .conf-section.east { flex-direction:row; }
    .conf-section.west { flex-direction:row-reverse; }
    .round-col { display:flex; flex-direction:column; justify-content:space-around; padding:4px 6px; min-width:158px; }
    .round-label { font-family:var(--fh); font-size:10px; font-weight:700; letter-spacing:.1em; color:var(--muted); text-align:center; margin-bottom:10px; text-transform:uppercase; }
    .finals-col { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4px 12px; min-width:155px; }
    .finals-col-inner { display:flex; flex-direction:column; align-items:center; gap:10px; justify-content:center; flex:1; width:100%; }
    .matchup { margin:4px 0; border:1px solid var(--border); border-radius:var(--r); overflow:hidden; background:var(--bg2); transition:border-color .2s; }
    .matchup.synced { border-color:var(--green-br); }
    .team-row { display:flex; align-items:center; gap:7px; padding:6px 9px; cursor:pointer; transition:background .12s; color:var(--text); }
    .team-row:hover:not(.locked):not(.tbd) { background:var(--bg3); }
    .team-row.winner { background:var(--bg3); font-weight:500; }
    .team-row.eliminated { opacity:.3; }
    .team-row.locked,.team-row.tbd { cursor:default; }
    .team-row.tbd { color:var(--muted); }
    .seed { font-size:10px; color:var(--muted); min-width:13px; font-family:var(--fh); }
    .tname { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:12px; font-family:var(--fh); font-weight:600; letter-spacing:.03em; }
    .api-badge { font-size:9px; padding:1px 5px; border-radius:3px; background:var(--green-bg); color:var(--green); border:1px solid var(--green-br); }
    .check { font-size:10px; color:var(--green); }
    .lock-icon { font-size:9px; color:var(--muted); }
    .divider-h { height:1px; background:var(--border); }
    .score-row { display:flex; align-items:center; gap:5px; padding:5px 9px; background:var(--bg); border-top:1px solid var(--border); }
    .score-label { font-size:10px; color:var(--muted); flex:1; font-family:var(--fh); letter-spacing:.05em; }
    .score-btns { display:flex; gap:4px; }
    .sbtn { padding:2px 7px; font-size:10px; font-family:var(--fh); font-weight:600; border:1px solid var(--border2); border-radius:4px; background:transparent; color:var(--muted); cursor:pointer; transition:all .12s; letter-spacing:.03em; }
    .sbtn:hover:not(.api-locked):not(.deadline-locked) { background:var(--bg3); color:var(--text); }
    .sbtn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .sbtn.api-locked,.sbtn.deadline-locked { cursor:default; opacity:.4; }
    .matchup-gap { height:8px; }
    .champion-box { text-align:center; padding:12px 8px; }
    .trophy { font-size:28px; }
    .champ-label { font-family:var(--fh); font-size:10px; font-weight:700; letter-spacing:.12em; color:var(--muted); margin:4px 0 3px; }
    .champ-name { font-family:var(--fh); font-size:16px; font-weight:700; color:var(--accent); min-height:22px; letter-spacing:.04em; }
    .champ-score { font-size:11px; color:var(--muted); margin-top:2px; }

    /* ── DEADLINE LOCK OVERLAY ── */
    .bracket-locked-msg { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--red-bg); border:1px solid var(--red-br); border-radius:var(--r); margin-bottom:14px; font-size:12px; color:var(--red); }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🏀 Bracket <span>Des Frates</span> 2026</div>
    <div class="header-sub">Concours de pronostics — gagnant + score de série</div>
  </div>
  <div class="header-right">
    <button class="btn primary" onclick="loadFromSheet()">⟳ Sync résultats</button>
    <span class="sync-status" id="sync-status"></span>
  </div>
</div>

<!-- PHASE BAR -->
<div class="phase-bar">
  <div id="phase-badge" class="phase-badge open">
    <span class="phase-dot pulse"></span>
    <span id="phase-text">SAISIE OUVERTE</span>
  </div>
  <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
    <div class="countdown" id="countdown"></div>
    <div class="deadline-note" id="deadline-note"></div>
  </div>
</div>

<div id="main-banner" class="banner info" style="display:none"></div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="showTab('bracket')">Bracket officiel</button>
  <button class="tab" onclick="showTab('my-bracket')">Mon bracket</button>
  <button class="tab" onclick="showTab('leaderboard')">Classement</button>
  <button class="tab" onclick="showTab('admin')">Admin</button>
</div>

<div class="panel active" id="panel-bracket">
  <div class="bracket-wrap">
    <div class="bracket" id="main-bracket"></div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/TON_ID/pub?gid=0&single=true&output=csv';
const DEADLINE = '2026-04-17T18:00:00';
const EAST_TEAMS = [
  {seed:1,name:'Cavaliers'},{seed:8,name:'Heat'},
  {seed:4,name:'Pacers'},{seed:5,name:'Bucks'},
  {seed:3,name:'Knicks'},{seed:6,name:'Pistons'},
  {seed:2,name:'Celtics'},{seed:7,name:'Magic'}
];
const WEST_TEAMS = [
  {seed:1,name:'Thunder'},{seed:8,name:'Grizzlies'},
  {seed:4,name:'Nuggets'},{seed:5,name:'Clippers'},
  {seed:3,name:'Timberwolves'},{seed:6,name:'Warriors'},
  {seed:2,name:'Rockets'},{seed:7,name:'Lakers'}
];
const ROUND_PTS = [10,12,15,20];
const SCORE_BONUS = 2;

// ============================================================
<script>
// ============================================================
//  STATE
// ============================================================
let official = {
  east:  Array(7).fill(null).map(()=>({winner:null,score:null,fromApi:false})),
  west:  Array(7).fill(null).map(()=>({winner:null,score:null,fromApi:false})),
  final: {winner:null,score:null,fromApi:false}
};

// Liste des noms officiels pour normalisation
const ALL_NAMES = [...EAST_TEAMS,...WEST_TEAMS].map(t=>t.name);

// normalisation du nom
function normName(n){
  return ALL_NAMES.find(t=>t.toLowerCase()===n.trim().toLowerCase()) || n.trim();
}

// ============================================================
//  FETCH GOOGLE SHEET CSV
// ============================================================
async function fetchCSV(){
  const proxies = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(SHEET_CSV)}&t=${Date.now()}`,
    `https://corsproxy.io/?${encodeURIComponent(SHEET_CSV)}`
  ];
  for(const url of proxies){
    try{
      const res = await fetch(url);
      if(res.ok){
        const t = await res.text();
        if(t && t.length>10) return t;
      }
    }catch(e){}
  }
  throw new Error('Erreur Google Sheet');
}

async function loadFromSheet(){
  const statusEl = document.getElementById('sync-status');
  statusEl.textContent = "⏳ Synchronisation…"; 
  statusEl.className = 'sync-status';

  try{
    const text = await fetchCSV();
    const rows = parseCSV(text);
    const data = rows[0][0].toLowerCase()==='winner' ? rows.slice(1) : rows;

    let pending = data.map(r=>({winner:normName(r[0]),score:r[1]}));

    let passes = 6;
    while(pending.length && passes--){
      pending = pending.filter(r=>!applyResult(r.winner,r.score));
    }

    statusEl.textContent = "✔ Résultats synchronisés";
    statusEl.className = 'sync-status ok';
    console.log("OFFICIAL =", official);

  }catch(e){
    console.error(e);
    statusEl.textContent = "❌ Erreur de sync";
    statusEl.className = 'sync-status err';
  }
}

function parseCSV(text){
  return text.trim().split('\n').map(l=>l.split(','));
}

// ============================================================
//  APPLY RESULTS
// ============================================================
function applyResult(winner, score){
  winner = normName(winner);
  let applied = false;

  ['east','west'].forEach(conf=>{
    official[conf].forEach((m,i)=>{
      const candidates = getMatchCandidates(conf,i);
      if(candidates.includes(winner)){
        if(!m.fromApi){
          m.winner = winner;
          m.score = score;
          m.fromApi = true;
          cascade(official,conf);
        }
        applied = true;
      }
    });
  });

  // Finale
  const finalists = [official.east[6].winner, official.west[6].winner].filter(Boolean);
  if(finalists.includes(winner)){
    official.final.winner = winner;
    official.final.score = score;
    official.final.fromApi = true;
    applied = true;
  }

  return applied;
}

// ============================================================
//  MATCH CANDIDATES
// ============================================================
function getMatchCandidates(conf, idx){
  if(idx<4){
    const teams = conf==='east'?EAST_TEAMS:WEST_TEAMS;
    return [teams[idx*2].name,teams[idx*2+1].name].map(normName);
  }
  if(idx<6){
    return [
      official[conf][(idx-4)*2].winner,
      official[conf][(idx-4)*2+1].winner
    ].filter(Boolean);
  }
  return [
    official[conf][4].winner,
    official[conf][5].winner
  ].filter(Boolean);
}

// ============================================================
//  CASCADE
// ============================================================
function cascade(picks,conf){
  // R2 reset
  for(let m=0;m<2;m++){
    const t1 = picks[conf][m*2].winner;
    const t2 = picks[conf][m*2+1].winner;
    const r2 = picks[conf][4+m];
    if(r2.winner && r2.winner!==t1 && r2.winner!==t2){
      r2.winner=null; r2.score=null; r2.fromApi=false;
    }
  }

  // R3 reset
  const r3 = picks[conf][6];
  if(r3.winner &&
     r3.winner!==picks[conf][4].winner &&
     r3.winner!==picks[conf][5].winner){
    r3.winner=null; r3.score=null; r3.fromApi=false;
  }

  // Finale
  const eastWinner = picks.east[6].winner;
  const westWinner = picks.west[6].winner;
  if(picks.final.winner &&
     ![eastWinner, westWinner].includes(picks.final.winner)){
    picks.final.winner = null; picks.final.score = null; picks.final.fromApi = false;
  }
}

// ============================================================
//  INITIAL LOAD
// ============================================================
loadFromSheet();
</script>

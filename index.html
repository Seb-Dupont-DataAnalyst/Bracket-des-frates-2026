<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bracket des frates 2026</title>
</head>

<body style="background:#111;color:white;font-family:sans-serif">

<h2>Bracket NBA 2026 (version clean)</h2>
<button onclick="loadFromSheet()">🔄 Sync résultats</button>

<pre id="output"></pre>

<script>
// ============================================================
// CONFIG (UNE SEULE FOIS)
// ============================================================
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRf8bRhqurQmQsLJiqb0ujUylKjul28oUyMasWIXFsm3sskmLgCw_Akxhip2zvDutTWcOjmDfD67WCV/pub?gid=0&single=true&output=csv';

const EAST_TEAMS = [
  {seed:1, name:'Cavaliers'}, {seed:8, name:'Heat'},
  {seed:4, name:'Pacers'},    {seed:5, name:'Bucks'},
  {seed:3, name:'Knicks'},    {seed:6, name:'Pistons'},
  {seed:2, name:'Celtics'},   {seed:7, name:'Magic'}
];

const WEST_TEAMS = [
  {seed:1, name:'Thunder'},      {seed:8, name:'Grizzlies'},
  {seed:4, name:'Nuggets'},      {seed:5, name:'Clippers'},
  {seed:3, name:'Timberwolves'}, {seed:6, name:'Warriors'},
  {seed:2, name:'Rockets'},      {seed:7, name:'Lakers'}
];

// ============================================================
// HELPERS
// ============================================================
const ALL_NAMES = [...EAST_TEAMS,...WEST_TEAMS].map(t=>t.name);

function normName(n){
  if(!n) return '';
  return ALL_NAMES.find(t=>t.toLowerCase()===n.trim().toLowerCase()) || n.trim();
}

// ============================================================
// STATE
// ============================================================
let official = emptyOfficial();

function emptyOfficial(){
  return {
    east:  Array(7).fill(null).map(()=>({winner:null,score:null,fromApi:false})),
    west:  Array(7).fill(null).map(()=>({winner:null,score:null,fromApi:false})),
    final: {winner:null,score:null,fromApi:false}
  };
}

// ============================================================
// FETCH CSV
// ============================================================
async function fetchCSV(){
  const proxies = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(SHEET_CSV)}&t=${Date.now()}`,
    `https://corsproxy.io/?${encodeURIComponent(SHEET_CSV)}`
  ];

  for(const url of proxies){
    try{
      const res = await fetch(url);
      if(res.ok){
        const text = await res.text();
        if(text && text.length > 10) return text;
      }
    }catch(e){}
  }

  throw new Error('Erreur Google Sheet');
}

function parseCSV(text){
  return text.trim().split('\n').map(line=>{
    const cells=[]; let cur=''; let inQ=false;

    for(const ch of line){
      if(ch === '"') inQ = !inQ;
      else if(ch === ',' && !inQ){
        cells.push(cur.trim());
        cur='';
      } else cur+=ch;
    }

    cells.push(cur.trim());
    return cells;
  });
}

// ============================================================
// LOAD
// ============================================================
async function loadFromSheet(){
  try{
    official = emptyOfficial(); // reset propre

    const text = await fetchCSV();
    const rows = parseCSV(text);

    const hasHeader = rows[0][0].toLowerCase()==='winner';
    const data = hasHeader ? rows.slice(1) : rows;

    let pending = data
      .filter(r=>r[0] && r[1])
      .map(r=>({
        winner:normName(r[0]),
        score:r[1].trim()
      }));

    let passes = 6;

    while(pending.length && passes--){
      pending = pending.filter(r=>!applyResult(r.winner,r.score));
    }

    render();

  }catch(e){
    console.error(e);
  }
}

// ============================================================
// APPLY RESULT
// ============================================================
function applyResult(winner, score){
  winner = normName(winner);
  let applied = false;

  ['east','west'].forEach(conf=>{
    official[conf].forEach((match,i)=>{
      const candidates = getMatchCandidates(conf,i);

      if(candidates.includes(winner)){
        if(!match.fromApi){
          match.winner = winner;
          match.score = score;
          match.fromApi = true;

          cascade(official, conf);
        }
        applied = true;
      }
    });
  });

  const finalists = [
    official.east[6].winner,
    official.west[6].winner
  ].filter(Boolean);

  if(finalists.includes(winner)){
    official.final.winner = winner;
    official.final.score = score;
    official.final.fromApi = true;
    applied = true;
  }

  return applied;
}

// ============================================================
// MATCH CANDIDATES
// ============================================================
function getMatchCandidates(conf, idx){

  if(idx < 4){
    const teams = conf==='east'?EAST_TEAMS:WEST_TEAMS;
    return [
      teams[idx*2].name,
      teams[idx*2+1].name
    ].map(normName);
  }

  if(idx < 6){
    return [
      official[conf][(idx-4)*2].winner,
      official[conf][(idx-4)*2+1].winner
    ].filter(Boolean).map(normName);
  }

  return [
    official[conf][4].winner,
    official[conf][5].winner
  ].filter(Boolean).map(normName);
}

// ============================================================
// CASCADE (FIX FINAL BUG)
// ============================================================
function cascade(picks, conf){

  // R2
  for(let m=0;m<2;m++){
    const t1 = picks[conf][m*2].winner;
    const t2 = picks[conf][m*2+1].winner;
    const r2 = picks[conf][4+m];

    if(r2.winner && r2.winner!==t1 && r2.winner!==t2){
      r2.winner=null;
      r2.score=null;
      r2.fromApi=false;
    }
  }

  // R3
  const r3 = picks[conf][6];
  if(r3.winner &&
    r3.winner!==picks[conf][4].winner &&
    r3.winner!==picks[conf][5].winner){
    r3.winner=null;
    r3.score=null;
    r3.fromApi=false;
  }

  // 🔥 FINAL FIX
  const eastWinner = picks.east[6].winner;
  const westWinner = picks.west[6].winner;

  if(picks.final.winner &&
     ![eastWinner, westWinner].includes(picks.final.winner)){
    picks.final.winner = null;
    picks.final.score = null;
    picks.final.fromApi = false;
  }
}

// ============================================================
// RENDER SIMPLE
// ============================================================
function render(){
  document.getElementById('output').textContent =
    JSON.stringify(official, null, 2);
}

// ============================================================
// INIT
// ============================================================
loadFromSheet();

</script>

</body>
</html>
